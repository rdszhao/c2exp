name: Build Windows Executable

permissions:
  contents: write

on:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Build executable with PyInstaller
        run: |
          cd app
          pyinstaller concept2_export.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Concept2Exporter-Windows
          path: app/dist/Concept2Exporter.exe
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Concept2Exporter-Windows

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Release ${{ steps.date.outputs.date }}
          body: |
            Concept2 Logbook Exporter - Windows Build

            **How to use:**
            1. Download `Concept2Exporter.exe` below
            2. Run the application
            3. Login with your Concept2 account
            4. Fetch and export your workouts to Excel
          files: Concept2Exporter.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
